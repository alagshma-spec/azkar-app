<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإحصائيات</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F3B36">
<link rel="apple-touch-icon" href="assets/icon-apple-touch.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="js/settings-init.js"></script>

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
</head>
<body>

<div class="phone">

  <header class="app-header">
    <button class="theme-toggle" onclick="location.href='index.html'">
      <span class="icon"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></span>
      <span>الأقسام</span>
    </button>
  </header>

  <section class="section">
    <h2 class="section-title">الإحصائيات</h2>
    <div class="horizon"></div>

    <div class="stat-big">
      <span class="icon"><svg viewBox="0 0 24 24"><path d="M12 2c1 3-3 4-3 8a3 3 0 006 0c0-1-1-2-1-3 2 1 4 3 4 6a6 6 0 01-12 0c0-5 4-7 6-11z"/></svg></span>
      <div class="stat-number" id="streak-number">٠</div>
      <div class="stat-caption">يوم متتالٍ</div>
    </div>

    <div class="week-row" id="week-row"></div>

    <div class="dhikr-card" style="margin-bottom:14px;">
      <div class="setting-label" style="margin-bottom:10px;">اليوم</div>
      <div class="today-list" id="today-list"></div>
    </div>

    <div class="dhikr-card" style="text-align:center;">
      <div class="stat-number" id="total-number" style="font-size:28px;">٠</div>
      <div class="stat-caption">إجمالي مرات الإتمام منذ البداية</div>
    </div>

  </section>

</div>

<script src="js/icons.js"></script>
<script src="js/stats.js"></script>
<script>
  const ARABIC_NUMS = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
  function toArabicNumerals(n) { return String(n).split('').map(d => ARABIC_NUMS[d] || d).join(''); }
  const DAY_LABELS = ['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];

  async function renderStatsPage() {
    document.getElementById('streak-number').textContent = toArabicNumerals(getStreak());
    document.getElementById('total-number').textContent = toArabicNumerals(getTotalCompletions());

    // آخر ٧ أيام
    const days = getLast7Days();
    document.getElementById('week-row').innerHTML = days.map(d => {
      const dayIndex = new Date(d.date).getDay();
      return `<div class="week-day">
        <div class="dot ${d.count > 0 ? 'filled' : ''}"></div>
        <span class="lbl">${DAY_LABELS[dayIndex]}</span>
      </div>`;
    }).join('');

    // قائمة أقسام اليوم
    try {
      const res = await fetch('data/azkar/categories.json');
      const categories = await res.json();
      const todayDone = getTodayCompletions();
      const enabled = categories.filter(c => c.enabled && c.key !== 'tasbeeh').sort((a, b) => a.order - b.order);

      document.getElementById('today-list').innerHTML = enabled.map(c => {
        const done = todayDone.includes(c.key);
        return `<div class="cat-row ${done ? 'done' : ''}">
          <span class="icon"><svg viewBox="0 0 24 24">${done ? ICONS.check_circle : renderEmptyCircle()}</svg></span>
          <span class="name">${c.title}</span>
        </div>`;
      }).join('');
    } catch (err) {
      console.error(err);
    }
  }

  function renderEmptyCircle() {
    return '<circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/>';
  }

  document.addEventListener('DOMContentLoaded', renderStatsPage);
</script>
<script src="js/register-sw.js"></script>
</body>
</html>
