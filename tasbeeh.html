<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المسبحة</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F3B36">
<link rel="apple-touch-icon" href="assets/icon-apple-touch.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="js/settings-init.js"></script>

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
<style>
  .tasbeeh-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 30px;
  }
  .tasbeeh-circle {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: linear-gradient(145deg, var(--gold), var(--sage));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 64px;
    color: var(--surface);
    cursor: pointer;
    user-select: none;
    box-shadow: 0 10px 30px var(--shadow);
    transition: transform 0.12s ease;
    margin-bottom: 20px;
  }
  .tasbeeh-circle:active { transform: scale(0.96); }
  .tasbeeh-hint {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 30px;
  }
  .preset-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    width: 100%;
  }
  .preset-btn {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink-soft);
    font-family: var(--font-ui);
    font-size: 13px;
  }
  .preset-btn.active { border-color: var(--gold); color: var(--gold); }
  .reset-btn {
    width: 100%;
  }
</style>
</head>
<body>

<div class="phone">

  <header class="app-header">
    <button class="theme-toggle" onclick="location.href='index.html'">
      <span class="icon"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></span>
      <span>الأقسام</span>
    </button>
  </header>

  <section class="section">
    <h2 class="section-title">المسبحة</h2>
    <p class="section-sub">عدّاد حر — يُحفظ تلقائيًا</p>
    <div class="horizon"></div>

    <div class="tasbeeh-wrap">
      <div class="preset-row">
        <button class="preset-btn" data-target="33" onclick="setTarget(33)">٣٣</button>
        <button class="preset-btn" data-target="100" onclick="setTarget(100)">١٠٠</button>
        <button class="preset-btn" data-target="0" onclick="setTarget(0)">بدون حد</button>
      </div>

      <div class="tasbeeh-circle" id="tasbeeh-counter" onclick="tapTasbeeh()">٠</div>
      <div class="tasbeeh-hint" id="target-hint">اضغط لبدء العدّ</div>

      <button class="btn reset-btn" onclick="resetTasbeeh()">
        <span class="icon"><svg viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.5 9A9 9 0 105.6 18.4L1 20M23 4l-4.6 4.6"/></svg></span>
        إعادة تصفير
      </button>
    </div>
  </section>

</div>

<script src="js/toast.js"></script>
<script src="js/tasbeeh.js"></script>
<script src="js/register-sw.js"></script>
</body>
</html>
