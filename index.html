<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكار</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F3B36">
<link rel="apple-touch-icon" href="assets/icon-apple-touch.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="js/settings-init.js"></script>

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
</head>
<body>

<div class="phone">

  <header class="app-header">
    <h1 class="app-title">أذكار</h1>
    <div style="display:flex; gap:8px;">
      <button class="icon-btn" onclick="location.href='settings.html'" aria-label="الإعدادات">
        <span class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 005 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 005 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 5a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>
      </button>
      <button class="icon-btn" onclick="location.href='favorites.html'" aria-label="المفضلة">
        <span class="icon"><svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 00-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/></svg></span>
      </button>
      <button class="icon-btn" onclick="location.href='search.html'" aria-label="بحث">
        <span class="icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
      </button>
      <button class="theme-toggle" onclick="toggleTheme()">
        <span class="icon" id="theme-icon"><svg viewBox="0 0 24 24"></svg></span>
        <span id="theme-text">الوضع الليلي</span>
      </button>
    </div>
  </header>

  <div class="streak-banner" onclick="location.href='stats.html'" id="streak-banner">
    <span class="icon"><svg viewBox="0 0 24 24"><path d="M12 2c1 3-3 4-3 8a3 3 0 006 0c0-1-1-2-1-3 2 1 4 3 4 6a6 6 0 01-12 0c0-5 4-7 6-11z"/></svg></span>
    <div>
      <div class="streak-text" id="streak-text">٠ يوم متتالٍ</div>
      <div class="streak-sub">اضغط لعرض إحصائياتك</div>
    </div>
  </div>

  <section class="section">
    <h2 class="section-title">الأقسام</h2>
    <p class="section-sub">اختر القسم الذي تريد قراءته</p>
    <div class="horizon"></div>
    <div class="cat-grid" id="cat-grid">
      <!-- تُملأ ديناميكيًا بواسطة app.js -->
    </div>
  </section>

</div>

<script src="js/icons.js"></script>
<script src="js/stats.js"></script>
<script src="js/app.js"></script>
<script src="js/register-sw.js"></script>
</body>
</html>
